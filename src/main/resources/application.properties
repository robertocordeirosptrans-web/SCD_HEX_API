spring.jpa.open-in-view=false


#infos da aplicao

app.version=@project.version@
spring.thymeleaf.check-template-location=false

# ============================================
# CORS Configuration - Desenvolvimento
# ============================================
# Permite todas as origens em desenvolvimento para facilitar testes
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS,HEAD
cors.allowed-headers=*
cors.exposed-headers=Authorization,Content-Type,X-Total-Count,X-Page-Number,X-Page-Size
cors.allow-credentials=true
cors.max-age=3600

# ============================================
# Session Management
# ============================================
# Número máximo de sessões simultâneas por usuário (FASE 10)
session.max-concurrent=${SESSION_MAX_CONCURRENT:5}

# Habilita/desabilita o job de expiração automática de sessões
session.expiration-job.enabled=${SESSION_EXPIRATION_JOB_ENABLED:true}

# Cron: executa a cada hora (seg 0, min 0 de cada hora)
session.expiration-job.cron=${SESSION_EXPIRATION_JOB_CRON:0 0 * * * *}



rate-limiting.enabled=true

# ============================================
# Scheduler - Ativar/Desativar rotinas de recarga
# ============================================
scheduler.confirmar-recarga.enabled=true
scheduler.liberar-recarga.enabled=true
scheduler.processar-recarga.enabled=true


# ============================================
# Scheduler - Liberar Recarga
# ============================================
# Intervalo entre execuções do job (em ms). Default: 60s
scheduler.liberar-recarga.intervalo-ms=60000
# Atraso mínimo após pagamento antes de liberar (em minutos). Default: 3
scheduler.liberar-recarga.atraso-minutos=3
# Janela de busca retroativa a partir de (now - atraso) (em minutos). Default: 30
scheduler.liberar-recarga.janela-minutos=30
# Quantidade máxima de solicitações processadas por execução do job. Default: 100
scheduler.liberar-recarga.tamanho-lote=100

# ============================================
# Scheduler - Processar Recarga
# ============================================
# Intervalo entre execuções do job (em ms). Default: 60s
scheduler.processar-recarga.intervalo-ms=60000
# Quantidade máxima de solicitações processadas por execução do job. Default: 100
scheduler.processar-recarga.tamanho-lote=2

# ============================================
# Scheduler - Confirmar Recarga
# ============================================
# Intervalo entre execuções do job (em ms). Default: 30s
scheduler.confirmar-recarga.intervalo-ms=30000
# Quantidade máxima de solicitações processadas por execução do job. Default: 100
scheduler.confirmar-recarga.tamanho-lote=2

# ============================================
# Idempotência via banco de dados
# ============================================
# Tempo máximo (minutos) que um registro pode ficar em PROCESSING antes de ser
# considerado expirado (stale) e permitir reprocessamento.
idempotency.processing-timeout-minutes=${IDEMPOTENCY_PROCESSING_TIMEOUT_MINUTES:5}
# Tempo de retenção dos registros de idempotência (horas). Registros mais antigos
# são removidos pelo job IdempotencyCleanupJob.
idempotency.ttl-hours=${IDEMPOTENCY_TTL_HOURS:24}
# Cron do job de limpeza: executa a cada hora
idempotency.cleanup-cron=${IDEMPOTENCY_CLEANUP_CRON:0 0 * * * *}
