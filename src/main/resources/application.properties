# ============================================
# CORS Configuration - Desenvolvimento
# ============================================
# Permite todas as origens em desenvolvimento para facilitar testes
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS,HEAD
cors.allowed-headers=*
cors.exposed-headers=Authorization,Content-Type,X-Total-Count,X-Page-Number,X-Page-Size
cors.allow-credentials=true
cors.max-age=3600


rate-limiting.enabled=true

# ============================================
# Scheduler - Ativar/Desativar rotinas de recarga
# ============================================
scheduler.confirmar-recarga.enabled=false
scheduler.liberar-recarga.enabled=true
scheduler.processar-recarga.enabled=false


# ============================================
# Scheduler - Liberar Recarga
# ============================================
# Intervalo entre execuções do job (em ms). Default: 60s
scheduler.liberar-recarga.intervalo-ms=60000
# Atraso mínimo após pagamento antes de liberar (em minutos). Default: 3
scheduler.liberar-recarga.atraso-minutos=3
# Janela de busca retroativa a partir de (now - atraso) (em minutos). Default: 30
scheduler.liberar-recarga.janela-minutos=30
# Quantidade máxima de solicitações processadas por execução do job. Default: 100
scheduler.liberar-recarga.tamanho-lote=100

# ============================================
# Scheduler - Processar Recarga
